<!doctype html>
<html lang="en">
  <head>
    <!--
    File: index.html
    Purpose: 
    The main entry point for the Hackathon Buddy Single Page Application.
    Provides the basic DOM structure, metadata, and loads styles/scripts.
    -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hackathon Buddy</title>
    <meta
      name="description"
      content="Hackathon Buddy is a trust-first team formation platform for builders, designers, engineers, and product leaders."
    />
    <link rel="icon" href="assets/logo.png" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Toast notifications root element -->
    <div id="toast-root" aria-live="polite"></div>
    <!-- Main application root element where UI is mounted -->
    <div id="app"></div>

    <!-- Application entry script -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
